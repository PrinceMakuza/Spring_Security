# Default active profile
spring.profiles.active=dev

# Config location for YAML (ensuring it's picked up)
spring.config.import=optional:file:./src/main/resources/yaml/

# GraphQL Configuration - DISABLE built-in (using CDN HTML)
spring.graphql.graphiql.enabled=false
spring.graphql.path=/graphql

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=2002

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=8080

# Logging - GraphQL Diagnostics
logging.level.org.springframework.graphql=DEBUG
logging.level.graphql=DEBUG